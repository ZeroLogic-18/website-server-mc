<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Minecraft Kami</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://wallpaperaccess.com/full/1126773.jpg');
            background-size: cover;
            padding: 100px 20px;
            border-bottom: 5px solid #388e3c;
        }
        .container { padding: 50px 20px; }
        .ip-box {
            background-color: #1e1e1e;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            border: 2px dashed #388e3c;
            margin: 20px 0;
        }
        .ip-text { font-size: 24px; font-weight: bold; color: #4caf50; }
        .status { color: #8bc34a; font-weight: bold; }
        .btn {
            background-color: #388e3c;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background-color: #45a049; }
        footer { padding: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

<header>
    <h1>Selamat Datang di Server Kami</h1>
    <p>Survival - Creative - Minigames</p>
</header>

<div class="container">
    <h2>Main Sekarang!</h2>
    <div class="ip-box">
        <div class="status">● Server Online (Java 25)</div>
        <div class="ip-text">mc.serverkamu.com</div>
        <p>Versi: 26.1.2</p>
    </div>
    <br><br>
    <a href="https://discord.gg/link-discord-kamu" class="btn">Join Discord Kami</a>
</div>

<footer>
    &copy; 2026 Minecraft Server Info - Made with wit by Gemini
</footer>

</body>
</html>
