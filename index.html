<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafaalia SMP - Server Info</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .minecraft-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .minecraft-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .copy-toast {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .copy-toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <div class="max-w-3xl w-full">
        <!-- Header Section -->
        <header class="text-center mb-8 animate-fade-in">
            <div class="inline-block p-4 mb-4 rounded-2xl bg-gradient-to-br from-green-400 to-blue-500 shadow-lg mb-6">
                <i class="fas fa-cube text-5xl text-white"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-2">
                Cafaalia <span class="text-green-400">SMP</span>
            </h1>
            <p class="text-slate-400 text-lg">Server: Bedrock & Java V26.1.2</p>
            
            <div class="mt-4 flex justify-center">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-500/10 text-green-400 border border-green-500/20">
                    <span class="relative flex h-2 w-2 mr-2">
                        <span class="status-pulse absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    Server Online
                </span>
            </div>
        </header>

        <!-- Main Info Card -->
        <main class="glass-card rounded-3xl p-6 md:p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- IP Address -->
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-500 ml-1">📍 Alamat IP</label>
                    <div class="relative group">
                        <input id="ipAddress" type="text" readonly value="cafaaliaoneblock.ddns.net" 
                            class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-4 px-4 font-mono focus:outline-none">
                        <button onclick="copyToClipboard('ipAddress')" class="minecraft-btn absolute right-2 top-2 bottom-2 bg-green-600 hover:bg-green-500 text-white px-4 rounded-lg flex items-center transition-colors">
                            <i class="far fa-copy mr-2"></i> Salin
                        </button>
                    </div>
                </div>

                <!-- Port -->
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-500 ml-1">🔢 Port</label>
                    <div class="relative group">
                        <input id="portNumber" type="text" readonly value="25566" 
                            class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-4 px-4 font-mono focus:outline-none">
                        <button onclick="copyToClipboard('portNumber')" class="minecraft-btn absolute right-2 top-2 bottom-2 bg-slate-700 hover:bg-slate-600 text-white px-4 rounded-lg flex items-center transition-colors">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Features Grid -->
            <div class="pt-6 border-t border-slate-700/50">
                <h3 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">Fitur Utama</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="text-center p-3 rounded-xl bg-slate-800/40 border border-slate-700/30">
                        <i class="fas fa-plug text-blue-400 mb-2"></i>
                        <p class="text-xs">Crossplay</p>
                    </div>
                    <div class="text-center p-3 rounded-xl bg-slate-800/40 border border-slate-700/30">
                        <i class="fas fa-shield-halved text-green-400 mb-2"></i>
                        <p class="text-xs">Anti-Grief</p>
                    </div>
                    <div class="text-center p-3 rounded-xl bg-slate-800/40 border border-slate-700/30">
                        <i class="fas fa-bolt text-yellow-400 mb-2"></i>
                        <p class="text-xs">Low Lag</p>
                    </div>
                    <div class="text-center p-3 rounded-xl bg-slate-800/40 border border-slate-700/30">
                        <i class="fas fa-users text-purple-400 mb-2"></i>
                        <p class="text-xs">Friendly</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer / Last Update -->
        <footer class="mt-8 text-center space-y-4">
            <p class="text-slate-500 text-sm italic">
                <i class="far fa-calendar-alt mr-1"></i> Update terakhir: 02/05/2026 - 16:34
            </p>
            
            <div class="flex justify-center space-x-4">
                <a href="#" class="text-slate-400 hover:text-white transition-colors"><i class="fab fa-discord text-xl"></i></a>
                <a href="#" class="text-slate-400 hover:text-white transition-colors"><i class="fab fa-whatsapp text-xl"></i></a>
                <a href="#" class="text-slate-400 hover:text-white transition-colors"><i class="fab fa-instagram text-xl"></i></a>
            </div>
            
            <p class="text-xs text-slate-600">
                &copy; 2026 Cafaalia SMP Team. Minecraft is a trademark of Mojang AB.
            </p>
        </footer>
    </div>

    <!-- Custom Toast Message -->
    <div id="toast" class="copy-toast fixed bottom-8 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-full shadow-2xl flex items-center space-x-3 z-50">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">Teks berhasil disalin!</span>
    </div>

    <script>
        function copyToClipboard(elementId) {
            const copyText = document.getElementById(elementId);
            copyText.select();
            copyText.setSelectionRange(0, 99999); // For mobile devices

            try {
                document.execCommand('copy');
                showToast(elementId === 'ipAddress' ? 'IP Berhasil disalin!' : 'Port Berhasil disalin!');
            } catch (err) {
                console.error('Gagal menyalin text', err);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = message;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
