<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafaalia SMP | Official Website</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        :root {
            --mc-green: #55FF55;
            --mc-dark-green: #2e7d32;
            --mc-border: #373737;
            --mc-panel: rgba(16, 16, 16, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Minecraft-ia', sans-serif;
            background-color: #1a1a1a;
            color: white;
            overflow-x: hidden;
        }

        /* Background image */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.alphacoders.com/132/1327534.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main Container ala Minecraft UI */
        .mc-container {
            background: var(--mc-panel);
            border: 6px solid var(--mc-border);
            outline: 6px solid black;
            box-shadow: inset -6px -6px #000, inset 6px 6px #555;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            text-align: center;
        }

        .title {
            font-size: 2.5rem;
            margin-top: 0;
            color: #DDD;
            text-shadow: 4px 4px #000;
        }

        /* Status & IP Box */
        .status-box {
            border: 3px solid #1e1e1e;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .label { color: #AAA; font-size: 0.8rem; text-transform: uppercase; }
        .value { display: block; font-size: 1.5rem; color: var(--mc-green); margin-top: 5px; }

        .ip-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Grid System untuk info bawah */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .grid-item {
            background: rgba(0,0,0,0.4);
            border: 3px solid #1e1e1e;
            padding: 10px;
            text-align: left;
        }

        /* Tombol ala Minecraft */
        .mc-btn {
            background: #555;
            border: 3px solid #000;
            box-shadow: inset -3px -3px #222, inset 3px 3px #AAA;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Minecraft-ia', sans-serif;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
        }

        .mc-btn:hover {
            background: #777;
            box-shadow: inset -3px -3px #333, inset 3px 3px #CCC;
        }

        .mc-btn-blue { background: #5865F2; box-shadow: inset -3px -3px #2D337A, inset 3px 3px #8993F8; }
        .mc-btn-blue:hover { background: #6c78f5; }

        .announcement {
            text-align: left;
            font-size: 0.9rem;
            border-top: 2px solid #444;
            padding-top: 15px;
            margin-top: 15px;
        }

        .announcement ul { padding-left: 20px; color: #BBB; }
        
        footer { margin-top: 20px; font-size: 0.7rem; color: #555; }
    </style>
</head>
<body>

<div class="hero">
    <div class="mc-container">
        <h1 class="title">CAFAALIA SMP</h1>
        
        <div class="status-box">
            <span class="label">● Server Status: <span style="color:var(--mc-green)">Online</span></span>
        </div>

        <div class="status-box ip-row">
            <div>
                <span class="label">Server IP:</span>
                <span class="value" id="ip">play.cafaalia.com</span>
            </div>
            <button class="mc-btn" onclick="copyIP()">COPY IP</button>
        </div>

        <div class="grid">
            <div class="grid-item">
                <span class="label">Server Version:</span>
                <span class="value" style="color:white; font-size: 1.2rem;">Paper 1.21+</span>
            </div>
            <div class="grid-item">
                <span class="label">Online Players:</span>
                <span class="value" style="color:white; font-size: 1.2rem;">34 / 100</span>
            </div>
        </div>

        <div class="grid">
            <a href="https://discord.gg/link-kamu" class="mc-btn mc-btn-blue" style="width: 80%;">DISCORD SERVER</a>
            <a href="#" class="mc-btn" style="width: 80%;">SERVER RULES</a>
        </div>

        <div class="announcement">
            <span class="label">Latest Announcements:</span>
            <ul>
                <li>Season 5 Updates!</li>
                <li>New Community Event is live!</li>
            </ul>
        </div>

        <footer>Powered by Gemini for ZeroLogic-18</footer>
    </div>
</div>

<script>
    function copyIP() {
        const ipText = document.getElementById("ip").innerText;
        navigator.clipboard.writeText(ipText);
        alert("IP Copied: " + ipText);
    }
</script>

</body>
</html>
